<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

    min-height: 100vh;
    width: 100vw;

    background: linear-gradient(-45deg, #050816, #0b1a2f, #12002a, #001018);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;

    color: white;
}

/* animated bg */
@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* scanlines */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,255,0.04),
        rgba(255,0,255,0.02) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events: none;
}

/* glow orb */
body::after {
    content: "";
    position: fixed;
    width: 400px;
    height: 400px;
    background: rgba(0,255,255,0.12);
    filter: blur(120px);
    top: 10%;
    left: 10%;
    animation: floatGlow 7s ease-in-out infinite;
}

@keyframes floatGlow {
    0% { transform: translate(0,0); }
    50% { transform: translate(50px,30px); }
    100% { transform: translate(0,0); }
}

/* TOP BAR */
.header {
    background: rgba(10, 15, 30, 0.75);
    backdrop-filter: blur(15px);

    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;

    color: #00f6ff;
    text-shadow: 0 0 10px #00f6ff;

    border-bottom: 1px solid rgba(0,255,255,0.2);
}

/* MAIN GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;

    padding: 30px;
    max-width: 1200px;
    margin: auto;
}

/* CARD */
.card {
    background: rgba(10, 15, 30, 0.65);
    backdrop-filter: blur(15px);

    padding: 20px;
    border-radius: 14px;

    border: 1px solid rgba(0,255,255,0.15);

    box-shadow:
        0 0 15px rgba(0,255,255,0.15),
        inset 0 0 10px rgba(0,255,255,0.05);

    transition: 0.3s ease;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-6px) scale(1.03);
    border: 1px solid rgba(0,255,255,0.5);
    box-shadow:
        0 0 25px rgba(0,255,255,0.35),
        0 0 60px rgba(255,0,255,0.1);
}

.card h2 {
    margin-bottom: 10px;
    font-size: 18px;
    color: #00ffd5;
    text-shadow: 0 0 8px rgba(0,255,255,0.4);
}

.status {
    font-size: 14px;
    opacity: 0.9;
    color: #d0faff;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;

    font-size: 13px;
    opacity: 0.8;

    color: #a8f0ff;

    border-top: 1px solid rgba(0,255,255,0.2);

    background: rgba(10, 15, 30, 0.5);
    backdrop-filter: blur(10px);
}

/* BACK BUTTON AREA */
.bottom-bar {
    display: flex;
    justify-content: center;
    padding: 25px;
}

/* BUTTON */
.back-btn {
    padding: 12px 25px;
    border: none;
    border-radius: 12px;

    font-weight: bold;
    cursor: pointer;

    background: linear-gradient(90deg, #00f6ff, #0066ff);
    color: black;

    box-shadow: 0 0 15px rgba(0,255,255,0.4);

    transition: 0.3s ease;
}

.back-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px rgba(0,255,255,0.7);
}
</style>
</head>

<body>

<div class="header">
    Server Administration Panel
</div>

<div class="container">

    <div class="card">
        <h2>Server Status</h2>
        <div class="status">Running Successfully</div>
    </div>

    <div class="card">
        <h2>Security System</h2>
        <div class="status">Firewall Enabled</div>
    </div>

    <div class="card">
        <h2>Web Services</h2>
        <div class="status">Apache Active</div>
    </div>

    <div class="card">
        <h2>Monitoring</h2>
        <div class="status">Access Logs Active</div>
    </div>

    <div class="card">
        <h2>Virtual Hosts</h2>
        <div class="status">Site 1 & Site 2 Running</div>
    </div>

    <div class="card">
        <h2>System Health</h2>
        <div class="status">Stable</div>
    </div>

</div>

<!-- BACK TO INDEX BUTTON -->
<div class="bottom-bar">
    <a href="http://localhost/index.html">
        <button class="back-btn">Back to Index (Localhost)</button>
    </a>
</div>

<div class="footer">
    OS Project - Linux Web Server Deployment & Security Hardening
</div>

</body>
</html>
