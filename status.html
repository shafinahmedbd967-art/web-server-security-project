<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>System Status Monitor</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

    min-height: 100vh;
    width: 100vw;

    background: linear-gradient(-45deg, #050816, #0b1a2f, #12002a, #001018);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;

    color: #00ffcc;
}

/* animation */
@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* scanlines */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,255,0.04),
        rgba(255,0,255,0.02) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events: none;
}

/* glow orb */
body::after {
    content: "";
    position: fixed;
    width: 380px;
    height: 380px;
    background: rgba(0,255,255,0.12);
    filter: blur(120px);
    top: 15%;
    right: 10%;
    animation: floatGlow 7s ease-in-out infinite;
}

@keyframes floatGlow {
    0% { transform: translate(0,0); }
    50% { transform: translate(-50px,30px); }
    100% { transform: translate(0,0); }
}

/* HEADER */
.header {
    background: rgba(10, 15, 30, 0.75);
    backdrop-filter: blur(15px);

    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;

    color: #00f6ff;
    text-shadow: 0 0 10px #00f6ff;

    border-bottom: 1px solid rgba(0,255,255,0.2);
}

/* STATUS BOX */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 75vh;
}

/* GLASS BOX */
.box {
    background: rgba(10, 15, 30, 0.65);
    backdrop-filter: blur(18px);

    padding: 40px;
    border-radius: 16px;
    width: 400px;

    border: 1px solid rgba(0,255,255,0.2);

    box-shadow:
        0 0 20px rgba(0,255,255,0.25),
        0 0 60px rgba(255,0,255,0.1),
        inset 0 0 15px rgba(0,255,255,0.05);

    text-align: left;
    transition: 0.3s ease;
}

.box:hover {
    transform: scale(1.02);
    box-shadow:
        0 0 30px rgba(0,255,255,0.4),
        0 0 80px rgba(255,0,255,0.15);
}

/* STATUS ROW */
.item {
    padding: 10px 0;
    border-bottom: 1px solid rgba(0,255,255,0.15);
    font-size: 16px;
    color: #d0faff;
    transition: 0.3s ease;
}

.item:hover {
    transform: translateX(5px);
    color: #00f6ff;
    text-shadow: 0 0 8px rgba(0,255,255,0.5);
}

/* STATUS COLORS */
.status-ok {
    color: #00ff99;
    font-weight: bold;
    text-shadow: 0 0 8px rgba(0,255,120,0.5);
}

.status-warning {
    color: #ffd000;
    font-weight: bold;
}

.status-bad {
    color: #ff3b3b;
    font-weight: bold;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 10px;

    font-size: 12px;
    opacity: 0.7;

    color: #a8f0ff;
    border-top: 1px solid rgba(0,255,255,0.2);

    background: rgba(10, 15, 30, 0.5);
    backdrop-filter: blur(10px);
}

/* BACK BUTTON AREA */
.bottom-bar {
    display: flex;
    justify-content: center;
    padding: 20px;
}

/* BUTTON */
.back-btn {
    padding: 12px 25px;
    border: none;
    border-radius: 12px;

    font-weight: bold;
    cursor: pointer;

    background: linear-gradient(90deg, #00f6ff, #0066ff);
    color: black;

    box-shadow: 0 0 15px rgba(0,255,255,0.4);

    transition: 0.3s ease;
}

.back-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px rgba(0,255,255,0.7);
}
</style>
</head>

<body>

<div class="header">
System Status Monitoring Panel
</div>

<div class="container">
    <div class="box">

        <div class="item">
            Apache Web Server: <span class="status-ok">Running</span>
        </div>

        <div class="item">
            Firewall (UFW): <span class="status-ok">Active</span>
        </div>

        <div class="item">
            HTTPS Security: <span class="status-ok">Enabled</span>
        </div>

        <div class="item">
            Virtual Hosting: <span class="status-ok">Configured</span>
        </div>

        <div class="item">
            System Health: <span class="status-ok">Stable</span>
        </div>

    </div>
</div>

<!-- BACK TO INDEX BUTTON -->
<div class="bottom-bar">
    <a href="http://localhost/index.html">
        <button class="back-btn">Back to Index (Localhost)</button>
    </a>
</div>

<div class="footer">
Linux Web Server Deployment & Security Hardening Project
</div>

</body>
</html>
