<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Site 1 - Virtual Host</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #000000, #1a1a1a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
    width: 60%;
    max-width: 600px;
}

h1 {
    font-size: 36px;
    color: #00ffd5;
    margin-bottom: 10px;
}

p {
    font-size: 16px;
    opacity: 0.8;
    margin: 8px 0;
}

.status {
    margin-top: 20px;
    padding: 10px;
    background: #00c853;
    display: inline-block;
    border-radius: 20px;
    font-weight: bold;
}

.info {
    margin-top: 20px;
    text-align: left;
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

    <h1>Site 1 - Virtual Host</h1>

    <p>Apache Web Server Virtual Hosting Test Page</p>

    <div class="status">ACTIVE</div>

    <div class="info">
        <p><strong>Server:</strong> Ubuntu Linux</p>
        <p><strong>Web Server:</strong> Apache2</p>
        <p><strong>Hosting Type:</strong> Virtual Host</p>
        <p><strong>Status:</strong> Running Successfully</p>
    </div>

</div>

</body>
</html>
